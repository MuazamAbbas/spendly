{% macro category_bars(categories) %}
<div class="profile-categories">
    {% for cat in categories %}
    <div class="profile-cat-row">
        <span class="profile-cat-name">{{ cat.name }}</span>
        <div class="profile-cat-track">
            <div class="profile-cat-bar profile-cat-bar-{{ loop.index0 % 4 + 1 }} profile-cat-w-{{ cat.percent }}"></div>
        </div>
        <span class="profile-cat-amount">₨{{ "%.2f"|format(cat.total) }}</span>
    </div>
    {% endfor %}
</div>
{% endmacro %}
